services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pacotesbanho"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 0.0.0.0
      - 1.1.1.1
    networks:
      - petshop_network
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petshop_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - ${BACKEND_PORT}:8000
    depends_on:
      posrtgres_local:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    container_name: petshop_frontend
    restart: always
    ports:
      - "80:80"

volumes:
  pgdata: